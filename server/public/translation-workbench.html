<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>翻译工作台 - 多语言镜像</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/mirror.css">
</head>
<body>
  <div class="page-container" style="max-width:1800px;">
    <div class="top-bar" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center;">
      <div style="color: white; font-size: 14px;">
        <span>💡 演示提示：切换不同用户体验认领和权限控制</span>
      </div>
      <div class="user-selector" style="display: flex; align-items: center; gap: 8px;">
        <label style="font-size: 13px; color: #fff;">当前用户:</label>
        <select id="currentUserSelect" onchange="changeCurrentUser(this.value)" style="padding: 6px 10px; border-radius: 6px; border: none; font-size: 13px;">
          <option value="">匿名用户</option>
          <option value="user-admin">user-admin (管理员)</option>
          <option value="user-editor">user-editor (编辑者)</option>
          <option value="user-viewer">user-viewer (只读)</option>
          <option value="translator-alice">translator-alice (翻译员Alice)</option>
          <option value="translator-bob">translator-bob (翻译员Bob)</option>
          <option value="translator-carol">translator-carol (翻译员Carol)</option>
        </select>
      </div>
    </div>
    <div id="workbenchHeader" class="mirror-header"></div>

    <div id="workbenchToolbar" class="workbench-toolbar"></div>

    <div id="workbenchContainer" class="workbench-container">
      <div class="workbench-panel">
        <div class="panel-header">
          <h3>📄 主文档（原文）</h3>
          <span style="font-size:12px;color:#64748b;">左栏参考</span>
        </div>
        <div id="masterPanel" class="panel-content"></div>
      </div>
      <div class="workbench-panel">
        <div class="panel-header">
          <h3>✏️ 目标语言（译文）</h3>
          <span style="font-size:12px;color:#64748b;">Ctrl+Enter 快速提交</span>
        </div>
        <div id="targetPanel" class="panel-content"></div>
      </div>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <div id="mainContent" style="display:none;"></div>

  <script src="/js/translation-workbench.js"></script>
</body>
</html>
