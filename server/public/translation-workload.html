<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>翻译负载视图 - 文档协作平台</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/mirror.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="header-content">
        <div class="logo">
          <span class="logo-icon">🌐</span>
          <span class="logo-text">文档协作平台</span>
        </div>
        <div class="user-selector" style="display: flex; align-items: center; gap: 8px;">
          <label style="font-size: 13px; color: #fff;">当前用户:</label>
          <select id="currentUserSelect" onchange="changeCurrentUser(this.value)" style="padding: 6px 10px; border-radius: 6px; border: none; font-size: 13px;">
            <option value="">匿名用户</option>
            <option value="user-admin">user-admin (管理员)</option>
            <option value="user-editor">user-editor (编辑者)</option>
            <option value="user-viewer">user-viewer (只读)</option>
            <option value="translator-alice">translator-alice (翻译员Alice)</option>
            <option value="translator-bob">translator-bob (翻译员Bob)</option>
            <option value="translator-carol">translator-carol (翻译员Carol)</option>
          </select>
        </div>
        <nav class="header-nav">
          <a href="/">首页</a>
          <a href="/templates">模板管理</a>
          <a href="/diff">版本对比</a>
        </nav>
      </div>
    </header>

    <main class="main-content" id="mainContent">
      <div class="page-header" id="workloadHeader">
      </div>

      <div class="workload-container" id="workloadContainer">
      </div>
    </main>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <script src="/js/translation-workload.js"></script>
</body>
</html>
